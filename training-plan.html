<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrick — 2026 Race Season</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Dark theme (original) ── */
  --bg:        #080b0d;
  --surface:   #0e1215;
  --surface2:  #141a1f;
  --border:    #1e2830;
  --border2:   #263340;
  --text:      #dde8f0;
  --muted:     #4a6070;
  --muted2:    #6a8090;
  --hdr-bg:    #0a0d0f;
  --hdr-text:  #dde8f0;
  --hdr-muted: #4a7060;

  /* accent colours */
  --green:  #00e5a0;
  --blue:   #0096ff;
  --purple: #b060ff;
  --orange: #ff6b35;
  --teal:   #6dd96d;
  --red:    #ff3d5a;
  --gold:   #f5c842;

  /* session type colours — dark bg, glow border, bright text */
  --c-rest-bg:    #141c22; --c-rest-bdr:    #263340; --c-rest-txt:    #4a6070;
  --c-easy-bg:    #071f18; --c-easy-bdr:    #0a4030; --c-easy-txt:    #00e5a0;
  --c-tempo-bg:   #071525; --c-tempo-bdr:   #0a2545; --c-tempo-txt:   #0096ff;
  --c-long-bg:    #160d28; --c-long-bdr:    #2a1250; --c-long-txt:    #b060ff;
  --c-shakeout-bg:#0a1f0f; --c-shakeout-bdr:#143520; --c-shakeout-txt:#6dd96d;
  --c-race-bg:    #2a0d00; --c-race-bdr:    #4a1a00; --c-race-txt:    #ff6b35;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; }

/* ── TOP ACCENT BAR (matches dashboard purple line) ── */
body::before {
  content:''; display:block; height:3px; width:100%;
  background: linear-gradient(90deg,#7c3aed,#2563eb,#16a34a);
  position:fixed; top:0; left:0; z-index:100;
}

/* ── HEADER ───────────────────────────── */
.hdr {
  height:62px; margin-top:3px;
  background:var(--hdr-bg);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:20px; padding:0 20px;
  position:fixed; top:3px; left:0; right:0; z-index:90;
}
.hdr-title { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:var(--green); letter-spacing:.04em; white-space:nowrap; }
.hdr-sub   { font-size:11px; color:var(--hdr-muted); white-space:nowrap; }
.hdr-spacer{ flex:1; }
.hdr-stat  { text-align:right; }
.hdr-stat span { display:block; }
.hdr-stat .val { font-family:'DM Mono',monospace; font-size:13px; color:var(--text); }
.hdr-stat .lbl { font-size:10px; color:var(--muted); }

/* ── LAYOUT ───────────────────────────── */
.layout {
  display:flex; height:100%;
  padding-top:65px; /* hdr height + accent bar */
}

/* ── SIDEBAR ──────────────────────────── */
.sidebar {
  width:320px; min-width:320px;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto; padding:16px 12px;
  display:flex; flex-direction:column; gap:16px;
}

/* ── CALENDAR ─────────────────────────── */
.cal-wrap { }
.cal-hdr  { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-hdr h3 { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:var(--muted2); letter-spacing:.08em; text-transform:uppercase; }
.cal-nav  { display:flex; gap:4px; }
.cal-nav button { background:none; border:1px solid var(--border); color:var(--muted2); border-radius:4px; width:22px; height:22px; cursor:pointer; font-size:12px; line-height:1; }
.cal-nav button:hover { border-color:var(--border2); color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-dow  { text-align:center; font-size:9px; color:var(--muted); padding:2px 0 4px; font-family:'DM Mono',monospace; }
.cal-day  {
  aspect-ratio:1; border-radius:4px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:10px; font-family:'DM Mono',monospace;
  border:1px solid transparent; transition:border-color .15s;
  position:relative; overflow:hidden;
}
.cal-day:hover { border-color:var(--border2); }
.cal-day.empty { cursor:default; }
.cal-day.today { box-shadow:0 0 0 1.5px var(--green); }
.cal-day.selected { box-shadow:0 0 0 2px var(--blue) !important; }

/* type colours on calendar */
.cal-day.t-rest     { background:var(--c-rest-bg);     color:var(--c-rest-txt); }
.cal-day.t-easy     { background:var(--c-easy-bg);     color:var(--c-easy-txt); }
.cal-day.t-tempo    { background:var(--c-tempo-bg);    color:var(--c-tempo-txt); }
.cal-day.t-long     { background:var(--c-long-bg);     color:var(--c-long-txt); }
.cal-day.t-shakeout { background:var(--c-shakeout-bg); color:var(--c-shakeout-txt); }
.cal-day.t-race     { background:var(--c-race-bg);     color:var(--c-race-txt); }

.cal-day .cd-num  { font-size:11px; font-weight:500; line-height:1; }
.cal-day .cd-km   { font-size:8px; margin-top:2px; opacity:.75; }
.cal-day .cd-dot  { width:4px; height:4px; border-radius:50%; margin-top:2px; }
.cal-day.t-easy .cd-dot     { background:var(--c-easy-txt); }
.cal-day.t-tempo .cd-dot    { background:var(--c-tempo-txt); }
.cal-day.t-long .cd-dot     { background:var(--c-long-txt); }
.cal-day.t-shakeout .cd-dot { background:var(--c-shakeout-txt); }
.cal-day.t-race .cd-dot     { background:var(--c-race-txt); }

/* status overlays */
.cal-day.s-done::after    { content:''; position:absolute; inset:0; background:rgba(0,229,160,.07); }
.cal-day.s-pending::after { content:''; position:absolute; inset:0; background:rgba(255,107,53,.04); }
.cal-day.s-skipped::after { content:''; position:absolute; inset:0; background:rgba(255,61,90,.08); }

/* ── STATS PANEL ──────────────────────── */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.stat-card  {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; padding:8px 10px;
}
.stat-card .s-val { font-family:'DM Mono',monospace; font-size:16px; color:var(--text); }
.stat-card .s-lbl { font-size:10px; color:var(--muted); margin-top:2px; }
.stat-card .s-sub { font-size:9px; color:var(--muted); margin-top:1px; }

/* ── PROGRESS BARS ────────────────────── */
.prog-wrap { display:flex; flex-direction:column; gap:8px; }
.prog-item {}
.prog-top  { display:flex; justify-content:space-between; font-size:10px; color:var(--muted2); margin-bottom:3px; }
.prog-bar  { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; transition:width .4s ease; }

/* ── LEGEND ───────────────────────────── */
.legend { display:flex; flex-wrap:wrap; gap:6px; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted2); }
.leg-dot  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

/* ── SECTION LABELS ───────────────────── */
.sec-label {
  font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
  color:var(--muted); letter-spacing:.08em; text-transform:uppercase;
  margin-bottom:6px;
}

/* ── MAIN PANEL ───────────────────────── */
.main {
  flex:1; overflow-y:auto;
  padding:20px 24px;
  display:flex; flex-direction:column; gap:20px;
}

/* ── THIS WEEK FOCUS ──────────────────── */
.twf-wrap { display:flex; flex-direction:column; gap:16px; height:100%; box-sizing:border-box; }

.twf-hdr {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:16px 20px; display:flex; align-items:center; gap:20px; flex-shrink:0;
}
.twf-hdr-left { flex:1; }
.twf-hdr-left h2 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--text); }
.twf-hdr-left p  { font-size:11px; color:var(--muted2); margin-top:3px; }
.twf-hdr-stats { display:flex; gap:24px; }
.twf-stat { text-align:right; }
.twf-stat .tv { font-family:'DM Mono',monospace; font-size:22px; color:var(--green); line-height:1; }
.twf-stat .tl { font-size:10px; color:var(--muted); margin-top:3px; }

.twf-sessions {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px; flex:1; min-height:0;
}

.sc {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:16px; cursor:pointer; transition:border-color .2s, background .2s;
  display:flex; flex-direction:column; position:relative; overflow:hidden;
}
.sc:hover { border-color:var(--border2); background:var(--surface2); }
.sc.today-card  { border-color:var(--green); box-shadow:0 0 24px rgba(0,229,160,.1); }
.sc.sel-card    { border-color:var(--blue) !important; background:#071525 !important; }
.sc.done-card   { opacity:.75; }
.sc.rest-card   { cursor:default; }

.sc-bar {
  position:absolute; top:0; left:0; right:0; height:3px;
}
.t-easy     .sc-bar { background:var(--green); }
.t-tempo    .sc-bar { background:var(--blue); }
.t-long     .sc-bar { background:var(--purple); }
.t-shakeout .sc-bar { background:var(--teal); }
.t-race     .sc-bar { background:var(--orange); }
.t-rest     .sc-bar { background:var(--border); }

.sc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-top:6px; }
.sc-dow  { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.08em; }
.sc-datestr { font-size:10px; color:var(--muted2); font-family:'DM Mono',monospace; }
.sc-pill {
  font-size:9px; padding:2px 7px; border-radius:20px; font-family:'DM Mono',monospace; white-space:nowrap;
}
.sc-pill.p-today { background:#0a2a1a; color:var(--green); border:1px solid #0a4030; }
.sc-pill.p-done  { background:rgba(0,229,160,.08); color:var(--green); border:1px solid rgba(0,229,160,.2); }
.sc-pill.p-next  { background:#0a1525; color:#4090d0; border:1px solid #0a2545; }

.sc-type {
  font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  font-family:'DM Mono',monospace; margin-top:12px;
}
.t-easy     .sc-type { color:var(--green); }
.t-tempo    .sc-type { color:var(--blue); }
.t-long     .sc-type { color:var(--purple); }
.t-shakeout .sc-type { color:var(--teal); }
.t-race     .sc-type { color:var(--orange); }
.t-rest     .sc-type { color:var(--muted); }

.sc-name { font-size:13px; color:var(--text); line-height:1.35; font-weight:500; margin-top:4px; }
.sc-km-big { font-family:'DM Mono',monospace; font-size:32px; font-weight:700; color:var(--text); margin-top:auto; padding-top:16px; line-height:1; }
.sc-km-big span { font-size:13px; color:var(--muted2); font-weight:400; }
.sc-meta { display:flex; flex-direction:column; gap:5px; margin-top:10px; }
.sc-meta-row { display:flex; gap:6px; align-items:center; }
.sc-meta-lbl { font-size:9px; color:var(--muted); font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.05em; min-width:36px; }
.sc-meta-val { font-size:10px; color:var(--muted2); font-family:'DM Mono',monospace; }
.sc-venue {
  margin-top:10px; font-size:10px; padding:4px 8px; border-radius:5px; font-family:'DM Mono',monospace; display:inline-block;
}
.sc-venue.tm { background:rgba(0,150,255,.08); color:#4090d0; border:1px solid rgba(0,150,255,.15); }
.sc-venue.od { background:rgba(109,217,109,.08); color:var(--teal); border:1px solid rgba(109,217,109,.15); }
.sc-check { font-size:36px; text-align:center; margin-top:auto; padding-top:12px; }

.sc-rest-inner { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:6px; padding:16px 0; }
.sc-rest-icon  { font-size:28px; opacity:.25; }
.sc-rest-label { font-size:11px; color:var(--muted); text-align:center; line-height:1.4; }

/* ── NEXT UP STRIP ────────────────────── */
.nextup-wrap {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px 20px; flex-shrink:0;
}
.nextup-lbl {
  font-family:'Syne',sans-serif; font-size:10px; font-weight:700; color:var(--muted);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px;
}
.nextup-list { display:flex; gap:10px; }
.nu-item {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; cursor:pointer; transition:border-color .15s;
}
.nu-item:hover { border-color:var(--border2); }
.nu-dow  { font-size:9px; color:var(--muted); font-family:'DM Mono',monospace; text-transform:uppercase; }
.nu-date { font-size:10px; color:var(--muted2); font-family:'DM Mono',monospace; }
.nu-name { font-size:11px; color:var(--text); margin-top:4px; font-weight:500; line-height:1.3; }
.nu-km   { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted2); margin-top:3px; }
.nu-type { font-size:9px; font-family:'DM Mono',monospace; font-weight:700; text-transform:uppercase; margin-top:4px; }
.t-easy   .nu-type { color:var(--green); }
.t-tempo  .nu-type { color:var(--blue); }
.t-long   .nu-type { color:var(--purple); }
.t-race   .nu-type { color:var(--orange); }
.t-shakeout .nu-type { color:var(--teal); }

/* ── DETAIL PANEL ─────────────────────── */
.detail-wrap {
  position:fixed; right:0; top:65px; bottom:0; width:340px;
  background:var(--surface); border-left:1px solid var(--border);
  overflow-y:auto; padding:20px;
  transform:translateX(100%); transition:transform .25s ease;
  z-index:80;
}
.detail-wrap.open { transform:translateX(0); }

.det-close {
  position:absolute; top:12px; right:12px;
  background:none; border:1px solid var(--border); color:var(--muted2);
  border-radius:4px; width:24px; height:24px; cursor:pointer; font-size:14px; line-height:1;
}
.det-close:hover { border-color:var(--border2); color:var(--text); }

.det-date  { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:4px; }
.det-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--text); margin-bottom:4px; }
.det-type  { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; margin-bottom:16px; }
.t-rest     .det-type { color:var(--c-rest-txt); }
.t-easy     .det-type { color:var(--c-easy-txt); }
.t-tempo    .det-type { color:var(--c-tempo-txt); }
.t-long     .det-type { color:var(--c-long-txt); }
.t-shakeout .det-type { color:var(--c-shakeout-txt); }
.t-race     .det-type { color:var(--c-race-txt); }

.det-metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.det-m { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
.det-m .dm-val { font-family:'DM Mono',monospace; font-size:15px; color:var(--text); }
.det-m .dm-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

.det-notes { font-size:12px; color:var(--muted2); line-height:1.6; margin-bottom:16px; }

.det-status-wrap { margin-bottom:16px; }
.det-status-wrap .sec-label { margin-bottom:8px; }
.status-btns { display:flex; gap:6px; }
.status-btn {
  flex:1; padding:6px; border-radius:5px; cursor:pointer;
  font-size:11px; font-family:'DM Mono',monospace; font-weight:500;
  border:1px solid var(--border); background:var(--surface2); color:var(--muted2);
  transition:all .15s;
}
.status-btn:hover { border-color:var(--border2); color:var(--text); }
.status-btn.active-done    { background:#071f15; border-color:#0a4030; color:var(--green); }
.status-btn.active-pending { background:#1f1007; border-color:#40200a; color:var(--orange); }
.status-btn.active-skipped { background:#1f0708; border-color:#40100a; color:var(--red); }

/* edit form */
.edit-form { display:none; flex-direction:column; gap:10px; }
.ef-row { display:flex; flex-direction:column; gap:4px; }
.ef-label { font-size:10px; color:var(--muted); }
.ef-input, .ef-select, .ef-textarea {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:5px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px;
  padding:6px 8px; width:100%;
}
.ef-input:focus, .ef-select:focus, .ef-textarea:focus {
  outline:none; border-color:var(--blue);
}
.ef-textarea { resize:vertical; min-height:70px; font-family:'DM Sans',sans-serif; }
.ef-btns { display:flex; gap:6px; margin-top:4px; }
.ef-btn {
  flex:1; padding:7px; border-radius:5px; cursor:pointer;
  font-size:11px; font-weight:600; border:none;
}
.ef-btn.save   { background:var(--blue); color:#fff; }
.ef-btn.cancel { background:var(--surface2); color:var(--muted2); border:1px solid var(--border); }
.ef-btn:hover  { opacity:.85; }

.det-edit-btn {
  width:100%; padding:7px; border-radius:5px; cursor:pointer;
  font-size:11px; font-weight:600;
  background:var(--surface2); border:1px solid var(--border); color:var(--muted2);
}
.det-edit-btn:hover { border-color:var(--border2); color:var(--text); }

/* empty state */
.det-empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; gap:8px; color:var(--muted); text-align:center;
}
.det-empty svg { opacity:.3; }
.det-empty p { font-size:12px; line-height:1.5; }

/* scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

/* ── RESPONSIVE: shift main when detail open ── */
body.detail-open .main { padding-right:360px; }

/* ── PHASE DIVIDER ────────────────────── */
.phase-divider {
  display:flex; align-items:center; gap:12px;
  padding:6px 0;
}
.phase-divider span {
  font-family:'Syne',sans-serif; font-size:10px; font-weight:700;
  color:var(--muted); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap;
}
.phase-divider::before,.phase-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="hdr">
  <div>
    <div class="hdr-title">Patrick — 2026 Race Season</div>
    <div class="hdr-sub">Training Plan · Jul 5 Bangkok Double Bridge HM → Aug 16 10K</div>
  </div>
  <div class="hdr-spacer"></div>
  <div class="hdr-stat" id="hdrWeekly">
    <span class="val">—</span>
    <span class="lbl">This Week km</span>
  </div>
  <div class="hdr-stat" id="hdrTotal">
    <span class="val">—</span>
    <span class="lbl">Total km logged</span>
  </div>
  <div class="hdr-stat" id="hdrDone">
    <span class="val">—</span>
    <span class="lbl">Sessions done</span>
  </div>
</header>

<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- Calendar -->
    <div class="cal-wrap">
      <div class="cal-hdr">
        <h3 id="calMonthLabel">Month</h3>
        <div class="cal-nav">
          <button onclick="calPrev()">‹</button>
          <button onclick="calNext()">›</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Stats -->
    <div>
      <div class="sec-label">Season Stats</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Progress -->
    <div>
      <div class="sec-label">Phase Progress</div>
      <div class="prog-wrap" id="progWrap"></div>
    </div>

    <!-- Legend -->
    <div>
      <div class="sec-label">Session Types</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--c-rest-txt)"></div>Rest</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c-easy-txt)"></div>Easy</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c-tempo-txt)"></div>Tempo</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c-long-txt)"></div>Long</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c-shakeout-txt)"></div>Shakeout</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c-race-txt)"></div>Race</div>
      </div>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <main class="main" id="mainPanel"></main>

  <!-- ── DETAIL PANEL ── -->

// ─── STATE ───────────────────────────────────────────────────────────────────
let overrides = {};   // { "YYYY-MM-DD": { ...partial } }
let sel = null;       // selected date string
let calYear, calMonth;

const today = new Date();
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
const todayStr = localDateStr(today);

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function load() {
  try { overrides = JSON.parse(localStorage.getItem('tp_overrides') || '{}'); } catch(e) { overrides = {}; }
}
function save() {
  localStorage.setItem('tp_overrides', JSON.stringify(overrides));
}

// ─── DATA HELPERS ─────────────────────────────────────────────────────────────
function getDay(dateStr) {
  const base = PLAN[dateStr] || { type:"rest", name:"Rest / Off", km:0, pace:"", hr:"", notes:"", status:"pending" };
  return { ...base, ...(overrides[dateStr] || {}) };
}

function allDates() {
  return Object.keys(PLAN).sort();
}

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmtDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${DOW[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ─── RENDER MAIN PANEL — THIS WEEK FOCUS ────────────────────────────────────
function renderMain() {
  const main = document.getElementById('mainPanel');
  main.innerHTML = '';

  // Find current week
  const todayD = new Date(todayStr + 'T00:00:00');
  let curWeek = WEEKS.find(w => {
    const s = new Date(w.start + 'T00:00:00');
    const e = new Date(w.end   + 'T00:00:00');
    return todayD >= s && todayD <= e;
  }) || WEEKS.find(w => new Date(w.start + 'T00:00:00') > todayD) || WEEKS[WEEKS.length-1];

  // Collect this week's dates
  const wStart = new Date(curWeek.start + 'T00:00:00');
  const wEnd   = new Date(curWeek.end   + 'T00:00:00');
  const wDates = [];
  const wCur = new Date(wStart);
  while (wCur <= wEnd) { wDates.push(localDateStr(wCur)); wCur.setDate(wCur.getDate()+1); }

  // Week stats
  const runDates  = wDates.filter(d => getDay(d).type !== 'rest');
  const doneDates = runDates.filter(d => getDay(d).status === 'done');
  const targetKm  = runDates.reduce((s,d) => s + (getDay(d).km||0), 0);
  const doneKm    = doneDates.reduce((s,d) => s + (getDay(d).km||0), 0);

  // Phase progress info
  const totalWeeks = WEEKS.length;
  const curWeekIdx = WEEKS.indexOf(curWeek) + 1;
  const phaseName  = PHASE_LABELS[curWeek.phase] || curWeek.phase;

  // Build header
  const hdr = document.createElement('div');
  hdr.className = 'twf-hdr';
  hdr.innerHTML = `
    <div class="twf-hdr-left">
      <h2>${curWeek.label}</h2>
      <p>${phaseName} &nbsp;·&nbsp; Week ${curWeekIdx} of ${totalWeeks} &nbsp;·&nbsp; ${wDates[0]} → ${wDates[wDates.length-1]}</p>
    </div>
    <div class="twf-hdr-stats">
      <div class="twf-stat"><div class="tv">${targetKm.toFixed(0)}<span style="font-size:12px;color:var(--muted)"> km</span></div><div class="tl">Target</div></div>
      <div class="twf-stat"><div class="tv">${doneDates.length}<span style="font-size:12px;color:var(--muted)">/${runDates.length}</span></div><div class="tl">Done</div></div>
      <div class="twf-stat"><div class="tv">${doneKm.toFixed(1)}<span style="font-size:12px;color:var(--muted)"> km</span></div><div class="tl">Logged</div></div>
    </div>`;
  main.appendChild(hdr);

  // Session grid — only non-rest days (Tue/Wed/Thu/Sun)
  const sessionDates = wDates.filter(d => getDay(d).type !== 'rest');

  function venueClass(notes) {
    if (!notes) return '';
    if (notes.toLowerCase().includes('treadmill')) return 'tm';
    if (notes.toLowerCase().includes('outdoor'))   return 'od';
    return '';
  }
  function venueTxt(notes) {
    if (!notes) return '';
    if (notes.toLowerCase().includes('treadmill')) return '🏃 Treadmill';
    if (notes.toLowerCase().includes('outdoor'))   return '🌳 Outdoor';
    return '';
  }

  const grid = document.createElement('div');
  grid.className = 'twf-sessions';

  sessionDates.forEach(dateStr => {
    const day  = getDay(dateStr);
    const d    = new Date(dateStr + 'T00:00:00');
    const isToday = dateStr === todayStr;
    const isSel   = dateStr === sel;
    const isDone  = day.status === 'done';

    const card = document.createElement('div');
    card.className = [
      'sc',
      't-' + day.type,
      isToday ? 'today-card' : '',
      isSel   ? 'sel-card'   : '',
      isDone  ? 'done-card'  : '',
    ].filter(Boolean).join(' ');
    card.onclick = () => selectDay(dateStr);

    const pill = isToday ? '<span class="sc-pill p-today">TODAY</span>'
               : isDone  ? '<span class="sc-pill p-done">✓ Done</span>'
               : '<span class="sc-pill p-next">Upcoming</span>';

    const venue = venueTxt(day.notes);
    const vc    = venueClass(day.notes);

    card.innerHTML = `
      <div class="sc-bar"></div>
      <div class="sc-top">
        <div>
          <div class="sc-dow">${DOW[d.getDay()]}</div>
          <div class="sc-datestr">${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}</div>
        </div>
        ${pill}
      </div>
      <div class="sc-type">${day.type}</div>
      <div class="sc-name">${day.name}</div>
      ${isDone ? '<div class="sc-check">✅</div>' : `
        <div class="sc-km-big">${day.km||'—'}<span> km</span></div>
        <div class="sc-meta">
          ${day.pace ? `<div class="sc-meta-row"><span class="sc-meta-lbl">Pace</span><span class="sc-meta-val">${day.pace}</span></div>` : ''}
          ${day.hr   ? `<div class="sc-meta-row"><span class="sc-meta-lbl">HR</span><span class="sc-meta-val">${day.hr}</span></div>` : ''}
        </div>
        ${venue ? `<div class="sc-venue ${vc}">${venue}</div>` : ''}
      `}
    `;
    grid.appendChild(card);
  });

  // If no sessions this week (e.g. race recovery), show a message card
  if (sessionDates.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'sc rest-card t-rest';
    msg.style.gridColumn = '1/-1';
    msg.innerHTML = `<div class="sc-bar"></div><div class="sc-rest-inner"><div class="sc-rest-icon">😴</div><div class="sc-rest-label">Full recovery week — no runs scheduled.<br>Sleep, eat well, stay hydrated.</div></div>`;
    grid.appendChild(msg);
  }

  main.appendChild(grid);

  // ── NEXT UP STRIP ──────────────────────────────────────────────────────────
  const allFutureDates = Object.keys(PLAN).sort().filter(d => {
    const day = getDay(d);
    return d > todayStr && day.type !== 'rest' && day.status === 'pending';
  });
  const nextDates = allFutureDates.slice(0, 4);

  if (nextDates.length > 0) {
    const nu = document.createElement('div');
    nu.className = 'nextup-wrap';
    nu.innerHTML = '<div class="nextup-lbl">Next Up</div><div class="nextup-list" id="nuList"></div>';
    main.appendChild(nu);

    const nuList = nu.querySelector('#nuList');
    nextDates.forEach(ds => {
      const day = getDay(ds);
      const d   = new Date(ds + 'T00:00:00');
      const item = document.createElement('div');
      item.className = 'nu-item t-' + day.type;
      item.onclick = () => selectDay(ds);
      item.innerHTML = `
        <div class="nu-dow">${DOW[d.getDay()]}</div>
        <div class="nu-date">${MONTHS[d.getMonth()]} ${d.getDate()}</div>
        <div class="nu-name">${day.name}</div>
        <div class="nu-km">${day.km} km · ${day.pace||'—'}</div>
        <div class="nu-type">${day.type}</div>
      `;
      nuList.appendChild(item);
    });
  }
}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function renderCal() {
  if (calYear === undefined) {
    calYear  = today.getFullYear();
    calMonth = today.getMonth();
  }

  document.getElementById('calMonthLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day-of-week headers
  ['S','M','T','W','T','F','S'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = PLAN[ds] ? getDay(ds) : null;
    const el = document.createElement('div');
    el.className = `cal-day${day ? ` t-${day.type} s-${day.status}` : ''}${ds===todayStr?' today':''}${ds===sel?' selected':''}`;
    if (day) el.onclick = () => selectDay(ds);
    else el.style.cursor = 'default';
    el.innerHTML = `<span class="cd-num">${d}</span>${day && day.km ? `<span class="cd-km">${day.km}</span>` : (day && day.type !== 'rest' ? `<span class="cd-dot"></span>` : '')}`;
    grid.appendChild(el);
  }
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const dates = allDates();

  const totalKm   = dates.reduce((s,d) => s + (getDay(d).status==='done' ? (getDay(d).km||0) : 0), 0);
  const totalSess = dates.filter(d => getDay(d).status==='done').length;
  const totalRuns = dates.filter(d => getDay(d).status==='done' && getDay(d).type!=='rest').length;
  const skipped   = dates.filter(d => getDay(d).status==='skipped').length;

  // This week
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
  const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
  const weekKm = dates.reduce((s,d) => {
    const dd = new Date(d+'T00:00:00');
    return s + (dd >= weekStart && dd <= weekEnd && getDay(d).status==='done' ? (getDay(d).km||0) : 0);
  }, 0);

  // Header
  document.querySelector('#hdrWeekly .val').textContent = weekKm.toFixed(1);
  document.querySelector('#hdrTotal  .val').textContent = totalKm.toFixed(1);
  document.querySelector('#hdrDone   .val').textContent = totalSess;

  // Stats grid
  const sg = document.getElementById('statsGrid');
  sg.innerHTML = `
    <div class="stat-card"><div class="s-val">${totalKm.toFixed(1)}</div><div class="s-lbl">Total km logged</div></div>
    <div class="stat-card"><div class="s-val">${weekKm.toFixed(1)}</div><div class="s-lbl">This week km</div></div>
    <div class="stat-card"><div class="s-val">${totalRuns}</div><div class="s-lbl">Runs completed</div></div>
    <div class="stat-card"><div class="s-val">${skipped}</div><div class="s-lbl">Skipped</div></div>
  `;

  // Phase progress
  const phases = [
    { label:"Base Rebuild",  ids:["w1","w2","w3"] },
    { label:"Build 1",       ids:["w4","w5","w6","w7","w8"] },
    { label:"Build 2",       ids:["w10","w11","w12"] },
    { label:"Peak/Taper",    ids:["w13","w14"] },
  ];
  const colours = ["#00e5a0","#0096ff","#b060ff","#f5c842"];

  const pw = document.getElementById('progWrap');
  pw.innerHTML = '';

  phases.forEach((ph,i) => {
    const wks  = WEEKS.filter(w => ph.ids.includes(w.id));
    const phDates = wks.flatMap(w => {
      const dates2=[]; const cur=new Date(w.start+'T00:00:00'); const end=new Date(w.end+'T00:00:00');
      while(cur<=end){dates2.push(localDateStr(cur));cur.setDate(cur.getDate()+1);}
      return dates2;
    }).filter(d => PLAN[d]);
    const done  = phDates.filter(d => getDay(d).status==='done').length;
    const total = phDates.length;
    const pct   = total ? Math.round(done/total*100) : 0;
    pw.innerHTML += `
      <div class="prog-item">
        <div class="prog-top"><span>${ph.label}</span><span>${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${colours[i]}"></div></div>
      </div>`;
  });
}

// ─── SELECT / DETAIL ─────────────────────────────────────────────────────────
function selectDay(dateStr) {
  sel = dateStr;
  renderMain();
  renderCal();
  openDetail(dateStr);
}

function openDetail(dateStr) {
  const day  = getDay(dateStr);
  const wrap = document.getElementById('detailPanel');
  wrap.classList.add('open');
  document.body.classList.add('detail-open');

  document.getElementById('detEmpty').style.display   = 'none';
  document.getElementById('detContent').style.display = 'block';

  // Remove old type classes
  wrap.className = wrap.className.replace(/\bt-\w+/g,'').trim();
  wrap.classList.add(`t-${day.type}`);

  document.getElementById('detDate').textContent  = fmtDate(dateStr);
  document.getElementById('detTitle').textContent = day.name;
  document.getElementById('detType').textContent  = day.type.toUpperCase();

  // Metrics
  const met = document.getElementById('detMetrics');
  met.innerHTML = '';
  if (day.km)   met.innerHTML += `<div class="det-m"><div class="dm-val">${day.km} km</div><div class="dm-lbl">Distance</div></div>`;
  if (day.pace) met.innerHTML += `<div class="det-m"><div class="dm-val">${day.pace}</div><div class="dm-lbl">Target Pace</div></div>`;
  if (day.hr)   met.innerHTML += `<div class="det-m"><div class="dm-val">${day.hr}</div><div class="dm-lbl">Target HR</div></div>`;

  document.getElementById('detNotes').textContent = day.notes || '';

  // Status buttons
  ['Done','Pending','Skipped'].forEach(s => {
    const btn = document.getElementById('btn'+s);
    btn.className = 'status-btn' + (day.status === s.toLowerCase() ? ` active-${s.toLowerCase()}` : '');
  });

  // Reset edit form
  document.getElementById('edForm').style.display = 'none';
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.body.classList.remove('detail-open');
  sel = null;
  renderMain();
  renderCal();
}

// ─── STATUS ──────────────────────────────────────────────────────────────────
function setStatus(status) {
  if (!sel) return;
  overrides[sel] = { ...(overrides[sel]||{}), status };
  save();
  renderMain();
  renderCal();
  updateStats();
  openDetail(sel);
}

// ─── EDIT ─────────────────────────────────────────────────────────────────────
function toggleEdit() {
  const form  = document.getElementById('edForm');
  const empty = document.getElementById('edEmpty');
  if (!sel) { form.style.display='none'; empty.style.display='block'; return; }
  if (form.style.display === 'flex') {
    form.style.display = 'none'; return;
  }
  const day = getDay(sel);
  document.getElementById('edName').value  = day.name  || '';
  document.getElementById('edType').value  = day.type  || 'rest';
  document.getElementById('edKm').value    = day.km    || '';
  document.getElementById('edPace').value  = day.pace  || '';
  document.getElementById('edHr').value    = day.hr    || '';
  document.getElementById('edNotes').value = day.notes || '';
  form.style.display = 'flex';
}

function saveEdit() {
  if (!sel) return;
  overrides[sel] = {
    ...(overrides[sel]||{}),
    name:  document.getElementById('edName').value,
    type:  document.getElementById('edType').value,
    km:    parseFloat(document.getElementById('edKm').value) || 0,
    pace:  document.getElementById('edPace').value,
    hr:    document.getElementById('edHr').value,
    notes: document.getElementById('edNotes').value,
  };
  save();
  renderMain();
  renderCal();
  updateStats();
  openDetail(sel);
  document.getElementById('edForm').style.display = 'none';
}

// ─── RESET (dev helper, not exposed in UI) ───────────────────────────────────
function resetAll() {
  overrides = {};
  localStorage.removeItem('tp_overrides');
  sel = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.body.classList.remove('detail-open');
  document.getElementById('edForm').style.display = 'none';
  renderCal(); renderMain(); updateStats();
}

// ─── CLEAR EDIT FORM on close ────────────────────────────────────────────────
function closeAndClear() {
  overrides = {};
  sel = null;
  document.getElementById('edEmpty').style.display  = 'flex';
  document.getElementById('edForm').style.display  = 'none';
  renderCal(); updateStats();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
load();
renderCal();
updateStats();
</script>
</body>
</html>
